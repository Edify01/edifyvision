  <!-- Edge highlights -->
  <polyline points="17,56 90,17 163,56 90,95 17,56" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linejoin="round"/>
  <line x1="90" y1="95" x2="90" y2="163" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
