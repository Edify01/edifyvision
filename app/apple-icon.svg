<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="top-apple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4893FF"/>
      <stop offset="100%" stop-color="#0179FE"/>
    </linearGradient>
    <linearGradient id="left-apple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#175CD3"/>
      <stop offset="100%" stop-color="#0F3F99"/>
    </linearGradient>
    <linearGradient id="right-apple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E90FA"/>
