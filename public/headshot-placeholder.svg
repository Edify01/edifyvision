<svg width="480" height="580" viewBox="0 0 480 580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d7f5"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="240" cy="195" r="100"/>
    </clipPath>
  </defs>
  <!-- background -->
  <rect width="480" height="580" fill="url(#bg)"/>
  <!-- subtle grid -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#94a3b8" stroke-width="0.4" opacity="0.4"/>
  </pattern>
  <rect width="480" height="580" fill="url(#grid)"/>
  <!-- body / suit shape -->
  <ellipse cx="240" cy="530" rx="175" ry="130" fill="url(#body)"/>
  <rect x="160" y="370" width="160" height="180" rx="12" fill="url(#body)"/>
  <!-- collar / shirt -->
  <polygon points="200,370 240,420 280,370" fill="#f8fafc" opacity="0.9"/>
  <polygon points="200,370 240,400 216,370" fill="#e0e7ff" opacity="0.6"/>
  <!-- head -->
  <circle cx="240" cy="195" r="100" fill="#f5d0a9"/>
  <!-- hair -->
  <ellipse cx="240" cy="115" rx="80" ry="52" fill="#2d1b0e"/>
  <rect x="160" y="115" width="160" height="40" fill="#2d1b0e" rx="4"/>
  <!-- neck -->
  <rect x="215" y="286" width="50" height="50" rx="6" fill="#f5d0a9"/>
  <!-- face details — eyes -->
  <ellipse cx="210" cy="195" rx="10" ry="11" fill="#fff"/>
  <ellipse cx="270" cy="195" rx="10" ry="11" fill="#fff"/>
  <circle cx="212" cy="196" r="6" fill="#2d1b0e"/>
  <circle cx="272" cy="196" r="6" fill="#2d1b0e"/>
  <circle cx="214" cy="193" r="2" fill="#fff"/>
  <circle cx="274" cy="193" r="2" fill="#fff"/>
  <!-- eyebrows -->
  <path d="M198,182 Q210,176 222,182" stroke="#2d1b0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M258,182 Q270,176 282,182" stroke="#2d1b0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M240,202 Q235,218 242,222 Q248,218 240,202" fill="none" stroke="#c9956a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M224,238 Q240,250 256,238" fill="none" stroke="#b07050" stroke-width="2.2" stroke-linecap="round"/>
  <!-- ears -->
  <ellipse cx="140" cy="200" rx="12" ry="18" fill="#f5d0a9"/>
  <ellipse cx="340" cy="200" rx="12" ry="18" fill="#f5d0a9"/>
  <!-- placeholder label -->
  <rect x="120" y="520" width="240" height="40" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="240" y="546" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#475467" letter-spacing="0.08em">YOUR PHOTO HERE</text>
</svg>
